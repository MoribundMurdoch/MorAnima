<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2447"/>
      <stop offset="1" stop-color="#0b0e1a"/>
    </linearGradient>
    <radialGradient id="glowc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7df9ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7df9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8c547" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e8c547" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bg)" stroke="#e8c547" stroke-width="14"/>

  <!-- ambient particles (fireflies) -->
  <circle cx="118" cy="118" r="34" fill="url(#glowg)"/>
  <circle cx="404" cy="96" r="26" fill="url(#glowc)"/>
  <circle cx="428" cy="330" r="30" fill="url(#glowg)"/>
  <circle cx="86" cy="352" r="24" fill="url(#glowc)"/>

  <!-- open eye (left): almond, iris, pupil, highlight -->
  <path d="M 96 208 Q 164 148 232 208 Q 164 262 96 208 Z"
        fill="#f2ecff" stroke="#0b0e1a" stroke-width="12" stroke-linejoin="round"/>
  <circle cx="164" cy="206" r="34" fill="#52c8dc"/>
  <circle cx="164" cy="206" r="16" fill="#0b0e1a"/>
  <circle cx="175" cy="195" r="8" fill="#ffffff"/>

  <!-- blinking eye (right): closed lid with lashes -->
  <path d="M 280 208 Q 348 252 416 208" fill="none"
        stroke="#e8c547" stroke-width="20" stroke-linecap="round"/>
  <path d="M 302 232 L 288 254 M 348 240 L 348 264 M 394 232 L 408 254"
        fill="none" stroke="#e8c547" stroke-width="14" stroke-linecap="round"/>

  <!-- talking mouth: open, jaw dropped -->
  <path d="M 178 322 Q 256 300 334 322 Q 340 412 256 420 Q 172 412 178 322 Z"
        fill="#3d0f1e" stroke="#0b0e1a" stroke-width="12" stroke-linejoin="round"/>
  <path d="M 196 330 Q 256 316 316 330 L 312 344 Q 256 332 200 344 Z" fill="#f2ecff"/>
  <path d="M 210 404 Q 256 424 302 404 Q 296 376 256 372 Q 216 376 210 404 Z" fill="#f06a9a"/>
</svg>
